name: Sync Skills to Agents Hub

on:
  push:
    branches: [main]
    paths:
      - 'plugins/*/skills/**'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vibekit
        uses: actions/checkout@v6

      - name: Sync skills to shrwnsan/agents
        env:
          GH_TOKEN: ${{ secrets.AGENTS_HUB_PAT }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::AGENTS_HUB_PAT secret is not configured"
            exit 1
          fi

          BRANCH="sync/vibekit-skills-${SOURCE_SHA:0:7}"

          # Clone agents hub (shallow)
          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/shrwnsan/agents.git" \
            /tmp/agents

          cd /tmp/agents
          git checkout -b "$BRANCH"

          # Find and sync each skill directory
          cd "$GITHUB_WORKSPACE"
          find plugins -path "*/skills/*/SKILL.md" | while read -r skill_file; do
            skill_dir=$(dirname "$skill_file")
            skill_name=$(basename "$skill_dir")

            echo "Syncing: $skill_name"
            rm -rf "/tmp/agents/skills/$skill_name"
            cp -r "$skill_dir" "/tmp/agents/skills/$skill_name"
          done

          # Create PR if anything changed
          cd /tmp/agents
          git add -A
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "sync: update skills from vibekit-claude-plugins

          Source: https://github.com/shrwnsan/vibekit-claude-plugins/commit/${SOURCE_SHA}"
            git push --force-with-lease origin "$BRANCH"

            # Create PR if one doesn't already exist for this branch
            EXISTING_PR=$(gh pr list --repo shrwnsan/agents --head "$BRANCH" --json number --jq '.[0].number // empty')
            if [ -n "$EXISTING_PR" ]; then
              echo "PR #${EXISTING_PR} already exists for ${BRANCH}, skipping creation"
            else
              gh pr create \
                --repo shrwnsan/agents \
                --base main \
                --head "$BRANCH" \
                --title "sync: update skills from vibekit-claude-plugins" \
                --body "Automated sync of skill files from [vibekit-claude-plugins](https://github.com/shrwnsan/vibekit-claude-plugins/commit/${SOURCE_SHA}).

          This PR was created by the \`sync-skills\` workflow."
            fi

            PR_NUM=$(gh pr list --repo shrwnsan/agents --head "$BRANCH" --json number --jq '.[0].number')
            gh pr merge "$PR_NUM" \
              --repo shrwnsan/agents \
              --squash \
              --delete-branch

            echo "Created and merged PR #${PR_NUM} on agents hub"
          else
            echo "No changes to sync"
          fi

          rm -rf /tmp/agents
